services:
#proxy
  app:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
      # Certificado SSL 
      # - "443:443"
    volumes:
      - ./app:/var/www/html:ro
      # certificado SSL (para proxy reverso)
      # - /var/www/certbot:/var/www/certbot:ro
      # - ./certs:/etc/certs:ro
      - ./nginx.config:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

# aplicação
  php:
    image: php:8.2-fpm-alpine
    container_name: php
    volumes:
      - ./app:/var/www/html:ro

# banco de dados
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app_php
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

# persistência de volume do banco
volumes:
  mariadb_data: