# OS: Fedora 

services:
#proxy
  app:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      # Certificado SSL 
      # - "443:443"
    volumes:
      - ./app:/var/www/html:Z
      # certificado SSL (para proxy reverso)
      # - /var/www/certbot:/var/www/certbot:ro
      # - ./certs:/etc/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:Z # mudar contexto do Selinux(Fedora) para o docker conseguir acessar o arquivo.
    depends_on:
      - php

# aplicação
  php:
    image: php:8.2-fpm-alpine
    container_name: php
    volumes:
      - ./app:/var/www/html

# banco de dados
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

# persistência de volume do banco
volumes:
  mariadb_data: